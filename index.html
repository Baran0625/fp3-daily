<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>FP3級 デイリー演習</title>
<style>
  :root{ --bg:#f4f6f9; --ink:#0f172a; --sub:#64748b; --line:#e5e7eb; --card:#fff; --dark:#1e293b; --accent:#fbbf24; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{background:var(--bg); color:var(--ink);
    font-family:system-ui,-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif; -webkit-font-smoothing:antialiased;}
  #app{max-width:480px; margin:0 auto; padding:0 16px 48px; min-height:100%;}
  header.top{padding:22px 2px 14px; display:flex; align-items:center; justify-content:space-between;}
  .eyebrow{font-size:12px; letter-spacing:3px; color:var(--sub); font-weight:600;}
  .date{font-size:20px; font-weight:700; margin-top:2px;}
  .pill{border:1px solid #cbd5e1; background:#fff; color:#334155; border-radius:999px; padding:8px 14px; font-size:13px; font-weight:600; cursor:pointer;}
  .pill.on{background:var(--dark); color:#fff;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:16px;}
  .tabnum{font-variant-numeric:tabular-nums;}
  .btn{border:none; cursor:pointer; border-radius:12px; font-weight:800; font-family:inherit;}
  .btn:disabled{cursor:not-allowed;}
  .bar{height:6px; background:#e2e8f0; border-radius:999px; overflow:hidden;}
  .bar > i{display:block; height:100%; background:var(--dark); border-radius:999px; transition:width .3s;}
  .sec-bar{height:7px; background:#eef2f6; border-radius:999px; overflow:hidden;}
  .sec-bar > i{display:block; height:100%; border-radius:999px; transition:width .7s;}
  .fade{animation:fade .25s ease;}
  @keyframes fade{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;}}
  a{color:#4f46e5;}
</style>
</head>
<body>
<div id="app"></div>

<!-- 問題バンク（このファイルを編集して問題を増やす） -->
<script src="./questions.js"></script>
<!-- スプレッドシート同期の設定（SYNC_URL を入れると有効化。空ならローカル保存のみ） -->
<script src="./sync.js"></script>

<script>
/* ===== 問題バンクの読み込み確認 ===== */
const SECTIONS = window.SECTIONS;
const QUESTIONS = window.QUESTIONS;
if(!SECTIONS || !QUESTIONS){
  document.getElementById("app").innerHTML =
    '<div style="padding:28px;color:#e11d48;line-height:1.7">questions.js が読み込まれていません。<br>index.html と同じフォルダに questions.js を置いてください。</div>';
  throw new Error("questions.js missing");
}

/* ===== 日付シード付き乱数 ===== */
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return((t^t>>>14)>>>0)/4294967296; }; }
function shuffle(arr,rng){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(rng()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
/* その日付の30問を決定的に選ぶ（同じ日は同じ／日が変わると変わる） */
function dailySet(dateKey){
  const base=parseInt(dateKey.replace(/-/g,""),10); const set=[];
  SECTIONS.forEach((s,si)=>{ const pool=QUESTIONS.filter(q=>q.section===s.id);
    const rng=mulberry32(base+si*9301+49297); set.push(...shuffle(pool.slice(),rng).slice(0,5)); });
  return set;
}

/* ===== 保存（localStorage、無理ならメモリ） ===== */
const mem={};
const store={ get(k){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):null; }catch(e){ return mem[k]??null; } },
  set(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){ mem[k]=v; } } };
const HKEY="fp3:history";
function getHistory(){ return store.get(HKEY)||[]; }
function putHistory(list){ store.set(HKEY,list); }

/* ===== 日付ユーティリティ ===== */
function todayKey(d=new Date()){ const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),day=String(d.getDate()).padStart(2,"0"); return `${y}-${m}-${day}`; }
function fmtDate(key){
  if(!key || typeof key !== "string" || key.indexOf("-") < 0){ return String(key || "―"); }
  const p = key.split("-").map(Number);
  const y = p[0], m = p[1], d = p[2];
  if(!y || !m || !d){ return key; }
  const wd = ["日","月","火","水","木","金","土"][new Date(y, m-1, d).getDay()];
  return `${m}月${d}日（${wd}）`;
}
function gradeColor(p){ return p>=80?"#059669":p>=60?"#d97706":"#e11d48"; }
function secOf(id){ return SECTIONS.find(s=>s.id===id); }
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function mcLabel(i){ return ["ア","イ","ウ"][i]; }

/* ===== リング（SVG文字列） ===== */
function ring(pct,size=132,stroke=12,color){
  const r=(size-stroke)/2,c=2*Math.PI*r,off=c*(1-pct/100),col=color||gradeColor(pct);
  return `<div style="position:relative;width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#e5e7eb" stroke-width="${stroke}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${col}" stroke-width="${stroke}" stroke-linecap="round"
        stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 ${size/2} ${size/2})"
        style="transition:stroke-dashoffset .9s cubic-bezier(.22,1,.36,1)"/>
    </svg>
    <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
      <span class="tabnum" style="font-size:${size*0.28}px;font-weight:700;color:${col};line-height:1">${pct}</span>
      <span style="font-size:${size*0.11}px;color:#64748b;margin-top:2px">％</span>
    </div></div>`;
}

/* ===== 状態 ===== */
let state={ view:"home", idx:0, answers:[], set:[], session:null };

function computeSession(dateKey,set,answers){
  const rows=set.map((q,i)=>({ id:q.id, section:q.section, chosen:answers[i], correct:answers[i]===q.answer }));
  const bySection={}; SECTIONS.forEach(s=>bySection[s.id]={correct:0,total:0});
  rows.forEach(r=>{ bySection[r.section].total++; if(r.correct) bySection[r.section].correct++; });
  const score=rows.filter(r=>r.correct).length;
  return { dateKey, ts:Date.now(), score, total:set.length, pct:Math.round(score/set.length*100), bySection, rows };
}
function overallStats(hist){
  let c=0,t=0; const sec={}; SECTIONS.forEach(s=>sec[s.id]={correct:0,total:0});
  hist.forEach(h=>{ c+=h.score; t+=h.total; SECTIONS.forEach(s=>{ if(h.bySection&&h.bySection[s.id]){ sec[s.id].correct+=h.bySection[s.id].correct; sec[s.id].total+=h.bySection[s.id].total; } }); });
  return { pct:t?Math.round(c/t*100):0, days:hist.length, totalQ:t, sec };
}
/* ローカルとリモート(スプレッドシート)の記録を dateKey でマージ（新しい ts を優先） */
function mergeHistories(local,remote){
  const map={};
  (local||[]).concat(remote||[]).forEach(h=>{ if(!h||!h.dateKey) return;
    const ex=map[h.dateKey]; if(!ex||(h.ts||0)>=(ex.ts||0)) map[h.dateKey]=h; });
  return Object.keys(map).map(k=>map[k]);
}

/* ===== 画面 ===== */
function render(){
  const app=document.getElementById("app"), tk=todayKey(), hist=getHistory();
  const doneToday=hist.some(h=>h.dateKey===tk);
  let html=`<header class="top">
    <div><div class="eyebrow">FP3級 デイリー演習</div><div class="date">${fmtDate(tk)}</div></div>
    <button class="pill ${state.view==="history"?"on":""}" data-act="${state.view==="history"?"home":"history"}">${state.view==="history"?"ホーム":"成績・履歴"}</button>
  </header><div class="fade">`;
  if(state.view==="home") html+=viewHome(tk,hist,doneToday);
  else if(state.view==="quiz") html+=viewQuiz();
  else if(state.view==="result") html+=viewResult();
  else if(state.view==="history") html+=viewHistory(hist);
  else if(state.view==="detail") html+=viewDetail();
  html+=`</div>`;
  app.innerHTML=html; window.scrollTo({top:0});
}

function viewHome(tk,hist,doneToday){
  const ov=overallStats(hist);
  let h=`<div class="card" style="background:linear-gradient(135deg,#1e293b,#334155);color:#fff;border:none;padding:24px 22px;box-shadow:0 10px 30px -12px rgba(15,23,42,.5)">
    <div style="font-size:13px;opacity:.85">本日の出題</div>
    <div class="tabnum" style="font-size:34px;font-weight:800;margin:4px 0 2px">30<span style="font-size:16px;font-weight:600;opacity:.8"> 問</span></div>
    <div style="font-size:13px;opacity:.8">6分野 × 各5問 ・ ○× / 3択 ・ 毎日ランダム</div>
    <button class="btn" data-act="start" style="margin-top:18px;width:100%;background:${doneToday?"#475569":"var(--accent)"};color:${doneToday?"#e2e8f0":"#1e293b"};font-size:16px;padding:14px 0">${doneToday?"もう一度挑戦する":"今日の問題を始める"}</button>`;
  if(doneToday) h+=`<button class="btn" data-act="showtoday" style="margin-top:10px;width:100%;background:transparent;color:#e2e8f0;border:1px solid #64748b;font-size:14px;padding:11px 0;font-weight:700">本日の結果・解説を見る</button>`;
  h+=`</div><div style="margin-top:22px;font-size:13px;font-weight:700;color:#475569">出題分野</div>
    <div style="margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:10px">`;
  SECTIONS.forEach(s=>{ h+=`<div class="card" style="padding:12px;display:flex;align-items:center;gap:10px"><span style="width:10px;height:10px;border-radius:3px;background:${s.hex};flex-shrink:0"></span><span style="font-size:12.5px;font-weight:600;line-height:1.25">${s.name}</span></div>`; });
  h+=`</div>`;
  if(hist.length){
    h+=`<div class="card" style="margin-top:22px;padding:18px;display:flex;align-items:center;gap:18px">${ring(ov.pct,92,10)}
      <div><div style="font-size:12px;color:#64748b;font-weight:600">通算正答率</div>
      <div style="font-size:13px;color:#334155;margin-top:4px">学習日数 <b>${ov.days}</b> 日 ・ 累計 <b>${ov.totalQ}</b> 問</div>
      <button class="btn" data-act="history" style="margin-top:8px;background:none;color:#4f46e5;font-size:13px;padding:0">詳しく見る →</button></div></div>`;
  }
  return h;
}

function viewQuiz(){
  const q=state.set[state.idx], sec=secOf(q.section), chosen=state.answers[state.idx];
  const isLast=state.idx===state.set.length-1, answered=state.answers.filter(a=>a!==null&&a!==undefined).length;
  let opts;
  if(q.type==="ox"){
    opts=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">`+[["o","○","正しい"],["x","×","誤り"]].map(([v,t,s])=>{
      const on=chosen===v; return `<button class="btn" data-choose="${v}" style="padding:22px 0;border:${on?"2px solid #1e293b":"1px solid #cbd5e1"};background:${on?"#1e293b":"#fff"};color:${on?"#fff":"#334155"}"><div style="font-size:34px;font-weight:800;line-height:1">${t}</div><div style="font-size:13px;margin-top:6px;opacity:.85;font-weight:600">${s}</div></button>`;
    }).join("")+`</div>`;
  } else {
    opts=`<div style="display:grid;gap:10px">`+q.options.map((o,i)=>{ const on=chosen===i;
      return `<button class="btn" data-choose="${i}" style="text-align:left;padding:14px;display:flex;gap:12px;align-items:center;font-weight:500;border:${on?"2px solid #1e293b":"1px solid #cbd5e1"};background:${on?"#f1f5f9":"#fff"}"><span style="width:26px;height:26px;border-radius:999px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;background:${on?"#1e293b":"#e2e8f0"};color:${on?"#fff":"#475569"}">${mcLabel(i)}</span><span style="font-size:15px;line-height:1.5">${esc(o)}</span></button>`;
    }).join("")+`</div>`;
  }
  const nav=isLast
    ? `<button class="btn" data-act="grade" ${answered<state.set.length?"disabled":""} style="flex:1;padding:13px 0;background:${answered<state.set.length?"#cbd5e1":"#059669"};color:#fff;font-size:15px">${answered<state.set.length?`未回答 ${state.set.length-answered} 問`:"答え合わせをする"}</button>`
    : `<button class="btn" data-act="next" ${chosen==null?"disabled":""} style="flex:1;padding:13px 0;background:${chosen==null?"#cbd5e1":"#1e293b"};color:#fff;font-size:15px">次へ ▶</button>`;
  return `<div style="margin-top:4px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:12px;font-weight:700;color:#fff;background:${sec.hex};border-radius:999px;padding:4px 10px">${sec.name}</span>
        <span class="tabnum" style="font-size:13px;color:#64748b;font-weight:600">${state.idx+1} / ${state.set.length}</span></div>
      <div class="bar"><i style="width:${(state.idx+1)/state.set.length*100}%"></i></div></div>
    <div class="card" style="margin-top:18px;padding:20px 18px;min-height:120px">
      <div style="font-size:11px;color:#94a3b8;font-weight:700;letter-spacing:1px">第${state.idx+1}問 ・ ${q.type==="ox"?"○×問題":"3択問題"}</div>
      <p style="font-size:16.5px;line-height:1.7;margin:8px 0 0;font-weight:500">${esc(q.q)}</p></div>
    <div style="margin-top:16px">${opts}</div>
    <div style="display:flex;gap:12px;margin-top:22px">
      <button class="btn" data-act="${state.idx===0?"home":"prev"}" style="padding:13px 18px;border:1px solid #cbd5e1;background:#fff;color:#475569;font-size:14px;font-weight:700">${state.idx===0?"中止":"◀ 戻る"}</button>${nav}</div>`;
}

function viewResult(){
  const s=state.session, set=state.set;
  let h=`<div class="card" style="padding:24px 18px;text-align:center">
    <div style="font-size:13px;color:#64748b;font-weight:700">${s.dateKey===todayKey()?"本日":fmtDate(s.dateKey)}の正答率</div>
    <div style="display:flex;justify-content:center;margin-top:12px">${ring(s.pct,140,13)}</div>
    <div style="margin-top:12px;font-size:15px;color:#334155"><b style="font-size:20px">${s.score}</b> / ${s.total} 問正解</div></div>`;
  h+=`<div class="card" style="margin-top:18px;padding:16px 18px"><div style="font-size:13px;font-weight:700;color:#475569;margin-bottom:12px">分野別</div>`;
  SECTIONS.forEach(sec=>{ const b=s.bySection[sec.id],p=b.total?Math.round(b.correct/b.total*100):0;
    h+=`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px"><span style="font-weight:600">${sec.name}</span><span class="tabnum" style="color:#64748b">${b.correct}/${b.total}</span></div><div class="sec-bar"><i style="width:${p}%;background:${sec.hex}"></i></div></div>`; });
  h+=`</div><div style="margin-top:18px;font-size:14px;font-weight:700;color:#334155">解説を見る</div><div style="margin-top:10px;display:grid;gap:10px">`;
  set.forEach((q,i)=>{ const row=s.rows[i],ok=row.correct,sec=secOf(q.section);
    const your=q.type==="ox"?(row.chosen==="o"?"○":row.chosen==="x"?"×":"未回答"):(row.chosen!=null?mcLabel(row.chosen):"未回答");
    const ans=q.type==="ox"?(q.answer==="o"?"○":"×"):mcLabel(q.answer);
    h+=`<div class="card" style="border-left:4px solid ${ok?"#059669":"#e11d48"};padding:14px">
      <div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:11px;font-weight:700;color:${sec.hex}">${sec.short}・第${i+1}問</span><span style="font-size:12px;font-weight:800;color:${ok?"#059669":"#e11d48"}">${ok?"正解":"不正解"}</span></div>
      <p style="font-size:14px;line-height:1.65;margin:8px 0">${esc(q.q)}</p>
      ${q.type==="mc"?`<div style="font-size:12.5px;color:#64748b;margin-bottom:8px;line-height:1.7">${q.options.map((o,oi)=>`${mcLabel(oi)}. ${esc(o)}`).join("<br>")}</div>`:""}
      <div style="font-size:13px;margin-bottom:8px">あなた: <b style="color:${ok?"#059669":"#e11d48"}">${your}</b> <span style="color:#94a3b8;margin:0 6px">/</span> 正解: <b>${ans}</b></div>
      <div style="font-size:13px;line-height:1.65;color:#334155;background:#f8fafc;border-radius:8px;padding:10px 12px">${esc(q.exp)}</div></div>`; });
  h+=`</div><button class="btn" data-act="home" style="margin-top:22px;width:100%;padding:14px 0;background:#1e293b;color:#fff;font-size:15px">ホームに戻る</button>`;
  return h;
}

function viewHistory(hist){
  if(!hist.length) return `<div class="card" style="padding:40px 20px;text-align:center;color:#64748b">まだ記録がありません。<br>今日の問題を解くとここに残ります。</div>`;
  const ov=overallStats(hist);
  let h=`<div class="card" style="padding:20px 18px;display:flex;align-items:center;gap:20px">${ring(ov.pct,104,11)}
    <div><div style="font-size:12px;color:#64748b;font-weight:700">通算正答率</div><div style="font-size:13px;color:#334155;margin-top:6px;line-height:1.8">学習日数 <b>${ov.days}</b> 日<br>累計 <b>${ov.totalQ}</b> 問</div></div></div>`;
  h+=`<div class="card" style="margin-top:18px;padding:16px 18px"><div style="font-size:13px;font-weight:700;color:#475569;margin-bottom:12px">分野別の通算正答率</div>`;
  SECTIONS.forEach(s=>{ const b=ov.sec[s.id],p=b.total?Math.round(b.correct/b.total*100):0;
    h+=`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px"><span style="font-weight:600">${s.name}</span><span class="tabnum" style="color:#64748b">${p}%（${b.correct}/${b.total}）</span></div><div class="sec-bar"><i style="width:${p}%;background:${s.hex}"></i></div></div>`; });
  h+=`</div><div style="margin-top:18px;font-size:13px;font-weight:700;color:#475569">これまでの記録</div><div style="margin-top:10px;display:grid;gap:10px">`;
  hist.slice().sort((a,b)=>b.dateKey<a.dateKey?-1:1).forEach(hh=>{
    h+=`<button class="btn" data-detail="${hh.dateKey}" style="text-align:left;background:#fff;border:1px solid var(--line);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;font-weight:400">
      <div><div style="font-size:14px;font-weight:700">${fmtDate(hh.dateKey)}</div><div style="font-size:12px;color:#64748b;margin-top:2px">${hh.score}/${hh.total} 問正解</div></div>
      <div style="display:flex;align-items:center;gap:12px"><span class="tabnum" style="font-size:20px;font-weight:800;color:${gradeColor(hh.pct)}">${hh.pct}%</span><span style="color:#cbd5e1">›</span></div></button>`; });
  h+=`</div>`; return h;
}

function viewDetail(){
  return `<button class="btn" data-act="history" style="background:none;color:#4f46e5;font-size:14px;padding:4px 0;font-weight:700">◀ 履歴一覧</button>`+viewResult();
}

/* ===== 操作 ===== */
function handleClick(e){
  const t=e.target.closest("[data-act],[data-choose],[data-detail]"); if(!t) return;
  const hist=getHistory();
  if(t.dataset.choose!==undefined && t.dataset.choose!==""){
    const v=t.dataset.choose; state.answers[state.idx]=(state.set[state.idx].type==="ox")?v:parseInt(v,10); render(); return;
  }
  if(t.dataset.detail){
    const key=t.dataset.detail, rec=hist.find(h=>h.dateKey===key);
    state.set=dailySet(key); state.answers=state.set.map((q,i)=>rec?rec.rows[i].chosen:null);
    state.session=rec||computeSession(key,state.set,state.answers); state.view="detail"; render(); return;
  }
  const act=t.dataset.act;
  if(act==="history"){ state.view="history"; render(); }
  else if(act==="home"){ state.view="home"; render(); }
  else if(act==="start"){ const tk=todayKey(); state.set=dailySet(tk); state.answers=Array(state.set.length).fill(null); state.idx=0; state.view="quiz"; render(); }
  else if(act==="showtoday"){ const tk=todayKey(),rec=hist.find(h=>h.dateKey===tk); state.set=dailySet(tk); state.answers=rec?rec.rows.map(r=>r.chosen):state.set.map(()=>null); state.session=rec||computeSession(tk,state.set,state.answers); state.view="result"; render(); }
  else if(act==="next"){ state.idx++; render(); }
  else if(act==="prev"){ state.idx--; render(); }
  else if(act==="grade"){ const tk=todayKey(),s=computeSession(tk,state.set,state.answers); putHistory([s,...hist.filter(h=>h.dateKey!==tk)]); if(window.Sync) Sync.save(s); state.session=s; state.view="result"; render(); }
}

document.getElementById("app").addEventListener("click",handleClick);
render(); // まずローカルの記録で即描画
// スプレッドシートに記録があれば取り込んで再描画（オフライン・未設定時は何もしない）
if(window.Sync && Sync.enabled()){
  Sync.loadAll().then(remote=>{
    if(remote && remote.length){ putHistory(mergeHistories(getHistory(),remote)); render(); }
  });
}
